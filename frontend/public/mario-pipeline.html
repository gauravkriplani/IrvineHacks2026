<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario Pipeline UI</title>
  <style>
    /* ================================================================
       ✏️  EASY CUSTOMIZATION — CHANGE VALUES HERE
       Search for the variable name (e.g. --pipe-h-height) anywhere
       below to see exactly where it is used.
       ================================================================

       ── HORIZONTAL PIPE (desktop) ──────────────────────────────────
       --pipe-h-width   : max width of the pipe on desktop
       --pipe-h-height  : how tall/fat the pipe looks (taller = fatter)

       ── VERTICAL PIPE (mobile) ─────────────────────────────────────
       --pipe-v-width   : how wide/fat the pipe looks on mobile
       --pipe-v-height  : max height of the pipe on mobile

       ── PLAY BUTTON ────────────────────────────────────────────────
       --btn-width      : width of the play button
       --btn-height     : height of the play button

       ── UPLOAD / OUTPUT PANELS ─────────────────────────────────────
       --panel-width    : SVG intrinsic width (matches your SVG viewBox)
       --panel-opacity-empty : opacity when no file is loaded (upload)
                               and always for output until backend wires it
       ================================================================ */
    :root {
      /* HORIZONTAL PIPE */
      --pipe-h-width:  min(2000px, 52vw);   /* ← change pipe desktop width  */
      --pipe-h-height: 150px;               /* ← change pipe desktop height (fatness) */

      /* VERTICAL PIPE */
      --pipe-v-width:  60px;               /* ← change pipe mobile width   */
      --pipe-v-height: min(240px, 38vh);   /* ← change pipe mobile height  */

      /* PLAY BUTTON */
      --btn-width:  180px;                  /* ← change button width  */
      --btn-height: 80px;                  /* ← change button height */

      /* PANELS */
      --panel-width:         200px;        /* ← change panel size (keep matching SVG viewBox) */
      --panel-opacity-empty: 0.3;          /* ← OPACITY SETTING: 0.0 – 1.0, 0.5 = 50% */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #a3eef8;
      min-height: 100vh;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ===================== CLOUDS ===================== */
    .cloud {
      position: absolute;
      image-rendering: pixelated;
      will-change: transform;
    }
    .cloud svg { display: block; }

    /*
      All clouds start at left: 110vw (just off right edge).
      Negative animation-delay staggers them so they're spread across the sky.
      Adjust the duration per cloud to change individual speeds.
    */
    @keyframes cloudDrift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-240vw); }
    }

    .cloud-1  { top:  7%; left: 110vw; animation: cloudDrift 55s linear infinite; animation-delay:   0s; }
    .cloud-2  { top: 15%; left: 110vw; animation: cloudDrift 75s linear infinite; animation-delay: -18s; }
    .cloud-3  { top:  5%; left: 110vw; animation: cloudDrift 65s linear infinite; animation-delay: -40s; }
    .cloud-4  { top: 22%; left: 110vw; animation: cloudDrift 90s linear infinite; animation-delay: -10s; }
    .cloud-5  { top: 18%; left: 110vw; animation: cloudDrift 50s linear infinite; animation-delay: -30s; }
    .cloud-6  { top:  3%; left: 110vw; animation: cloudDrift 80s linear infinite; animation-delay: -55s; }
    .cloud-7  { top: 28%; left: 110vw; animation: cloudDrift 70s linear infinite; animation-delay: -45s; }
    .cloud-8  { top: 10%; left: 110vw; animation: cloudDrift 60s linear infinite; animation-delay:  -5s; }
    .cloud-9  { top: 20%; left: 110vw; animation: cloudDrift 85s linear infinite; animation-delay: -25s; }
    .cloud-10 { top:  2%; left: 110vw; animation: cloudDrift 72s linear infinite; animation-delay: -50s; }

    /* ===================== MAIN LAYOUT ===================== */
    .main-layout {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -40%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 24px;
      padding: 0 12px;
    }

    /* ===================== PANELS (upload / output) ===================== */
    .panel-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: block;
      flex-shrink: 0;
    }
    .panel-btn svg {
      display: block;
      image-rendering: pixelated;
      width: var(--panel-width);    /* ← uses --panel-width */
      height: auto;
    }

    /* OPACITY SETTING — uses --panel-opacity-empty from :root above */
    #uploadPanel { opacity: var(--panel-opacity-empty); transition: opacity 0.2s; }
    #uploadPanel.has-file { opacity: 1; }
    /* OPACITY SETTING — uses --panel-opacity-empty from :root above */
    #outputPanel { opacity: var(--panel-opacity-empty); transition: opacity 0.2s; }

    #fileInput { display: none; }

    /* ===================== PIPE + BUTTON CENTER ===================== */
    .pipe-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ===================== HORIZONTAL PIPE ===================== */
    /* uses --pipe-h-width and --pipe-h-height */
    .pipe-horizontal-container {
      width: var(--pipe-h-width);
    }
    .pipe-horizontal-container svg {
      width: 100%;
      height: var(--pipe-h-height);   /* ← height controls fatness */
      display: block;
      image-rendering: pixelated;
    }

    /* ===================== VERTICAL PIPE ===================== */
    /* uses --pipe-v-width and --pipe-v-height */
    .pipe-vertical-container svg {
      display: block;
      image-rendering: pixelated;
      width: var(--pipe-v-width);     /* ← width controls fatness on mobile */
      height: var(--pipe-v-height);
    }

    /* ===================== PLAY BUTTON ===================== */
    /* uses --btn-width and --btn-height */
    .play-btn {
      position: relative;
      width: var(--btn-width);        /* ← button width  */
      height: var(--btn-height);      /* ← button height */
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .play-btn-inner {
      position: absolute;
      left: 1px; right: 9px; top: 1px; bottom: 1px;
      background: #41D83D;
      transition: background 0.08s;
    }
    .play-btn-border {
      position: absolute;
      left: 0; right: 8px; top: 0; bottom: 0;
      pointer-events: none;
    }
    .play-btn-border::before {
      content: '';
      position: absolute;
      left: 1px; right: 1px; top: 0; bottom: 0;
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
    }
    .play-btn-border::after {
      content: '';
      position: absolute;
      top: 1px; bottom: 1px; left: 0; right: 0;
      border-left: 1px solid #000;
      border-right: 1px solid #000;
    }
    .play-btn-shadow-tr  { position:absolute; width:3px; height:2px; right:5px; top:0;               background:#009F00; }
    .play-btn-shadow-r   { position:absolute; width:3px;             right:5px; top:2px; bottom:1px;  background:#009F00; }
    .play-btn-shadow-b   { position:absolute; height:1px;            left:1px;  right:9px; bottom:0;  background:#009F00; }
    .play-btn-shadow-bl  { position:absolute; width:1px; height:1px; left:0;    bottom:1px;           background:#009F00; }
    .rivets { position:absolute; left:2px; right:10px; top:2px; bottom:2px; pointer-events:none; }
    .rivet  { position:absolute; width:6px; height:6px; }
    .rivet::before { content:''; position:absolute; inset:0; background:#000; }
    .rivet::after  { content:''; position:absolute; left:16.67%; right:16.67%; top:16.67%; bottom:16.67%; background:#93FCEE; }
    .rivet-tl { top:0;    left:0;  }
    .rivet-tr { top:0;    right:0; }
    .rivet-bl { bottom:0; left:0;  }
    .rivet-br { bottom:0; right:0; }
    .play-icon {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-38%, -50%);
      width: 0; height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 13px solid #009F00;
    }
    .play-btn:hover .play-btn-inner { background: #52eb4e; }
    .play-btn:active .play-btn-inner { filter: brightness(0.9); }

    /* ===================== RESPONSIVE ===================== */
    @media (min-width: 601px) {
      .pipe-vertical-container { display: none; }
      /* Remove .play-btn from flex flow so pipe-center's height = pipe only.
         This lets flex center the pipe against the panels correctly. */
      .pipe-center {
        position: relative;
        overflow: visible;
      }
      .play-btn {
        position: absolute;
        top: calc(100% + 20px);
        left: 50%;
        transform: translateX(-50%);
      }
    }

    @media (max-width: 600px) {
      .pipe-horizontal-container { display: none; }
      .main-layout {
        flex-direction: column;
        gap: 16px;
        transform: translate(-50%, -50%);
        padding: 0 12px;
      }
      /* Flatten pipe-center so its children participate in main-layout's flex order */
      .pipe-center { display: contents; }
      .pipe-vertical-container { order: 2; }
      #uploadPanel  { order: 1; }
      #outputPanel  { order: 3; }
      .play-btn     { order: 4; align-self: center; }
      .panel-btn svg {
        width: 80px;
        height: auto;
      }
      /* Make play button 50% size on small screens while preserving desktop size */
      .play-btn {
        width: calc(var(--btn-width) * 0.5);
        height: calc(var(--btn-height) * 0.5);
      }
    }
    /* ===================== OUTPUT PANEL — ready state ===================== */
    #outputPanel.has-result { opacity: 1; cursor: pointer; }

    /* ===================== PLAY BUTTON — loading state ==================== */
    .play-btn.loading .play-btn-inner { background: #e8c23a !important; }
    .play-btn.loading .play-icon { border-left-color: #a07800 !important; }

    /* ===================== HUD (mode toggle + status) ===================== */
    .hud {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .mode-bar {
      display: flex;
      gap: 6px;
    }
    .mode-btn {
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 2px solid #000;
      border-bottom-width: 3px;
      border-right-width: 3px;
      cursor: pointer;
      background: #41D83D;
      color: #003300;
      image-rendering: pixelated;
      transition: filter 0.08s;
      outline: none;
      user-select: none;
    }
    .mode-btn:hover { filter: brightness(1.12); }
    .mode-btn.active {
      background: #e8c23a;
      color: #3a2800;
      border-color: #3a2800;
    }
    .status-msg {
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #003300;
      background: rgba(255,255,255,0.7);
      padding: 3px 10px;
      border: 2px solid #000;
      min-width: 220px;
      text-align: center;
      max-width: 80vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-msg.error { color: #8b0000; border-color: #8b0000; background: rgba(255,200,200,0.8); }
    .status-msg.done  { color: #003300; border-color: #003300; background: rgba(180,255,180,0.85); }
    .status-msg.hidden { display: none; }

    @media (max-width: 600px) {
      .hud { bottom: 12px; }
      .mode-btn { font-size: 10px; padding: 4px 8px; }
    }
  </style>
</head>

</div><!-- /scene -->

  <!-- HUD: mode toggle + status -->
  <div class="hud">
    <div class="mode-bar">
      <button class="mode-btn active" id="modeWrappers">Generate Wrappers</button>
      <button class="mode-btn" id="modeAnnotate">Annotate Source</button>
    </div>
    <div class="status-msg hidden" id="statusMsg">Ready</div>
  </div>
<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost:4000'
  const MODES = {
    wrappers: { endpoint: '/api/generate-aom',    download: 'aom-wrappers.zip',      label: 'Generate Wrappers' },
    annotate: { endpoint: '/api/annotate-source', download: 'annotated-source.zip',  label: 'Annotate Source'   },
  }
  let currentMode = 'wrappers'
  let selectedFile = null
  let resultBlob   = null

  // ── Elements ────────────────────────────────────────────────────────────────
  const playBtn      = document.getElementById('playBtn')
  const sound        = document.getElementById('pipeSound')
  const uploadPanel  = document.getElementById('uploadPanel')
  const fileInput    = document.getElementById('fileInput')
  const uploadSvg    = document.getElementById('uploadSvg')
  const uploadedSvg  = document.getElementById('uploadedSvg')
  const fileLabel    = document.getElementById('fileLabel')
  const outputPanel  = document.getElementById('outputPanel')
  const statusMsg    = document.getElementById('statusMsg')
  const modeWrappers = document.getElementById('modeWrappers')
  const modeAnnotate = document.getElementById('modeAnnotate')

  // ── Mode toggle ─────────────────────────────────────────────────────────────
  modeWrappers.addEventListener('click', () => setMode('wrappers'))
  modeAnnotate.addEventListener('click', () => setMode('annotate'))

  function setMode(id) {
    currentMode = id
    modeWrappers.classList.toggle('active', id === 'wrappers')
    modeAnnotate.classList.toggle('active', id === 'annotate')
    setStatus('', 'hidden')
    clearResult()
  }

  // ── Status helper ───────────────────────────────────────────────────────────
  function setStatus(text, cls = '') {
    statusMsg.textContent = text
    statusMsg.className   = 'status-msg' + (cls ? ' ' + cls : '')
  }

  // ── Result state ────────────────────────────────────────────────────────────
  function setResult(blob) {
    resultBlob = blob
    outputPanel.classList.add('has-result')
    outputPanel.title = 'Click to download ' + MODES[currentMode].download
  }

  function clearResult() {
    resultBlob = null
    outputPanel.classList.remove('has-result')
    outputPanel.title = 'Output (click play to generate)'
  }

  // ── Upload panel — click to pick file ───────────────────────────────────────
  uploadPanel.addEventListener('click', () => {
    if (playBtn.classList.contains('loading')) return
    fileInput.click()
  })

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0]
    if (!file) return
    selectedFile = file
    let name = file.name
    if (name.length > 12) name = name.slice(0, 10) + '\u2026'
    fileLabel.textContent = name
    uploadSvg.style.display    = 'none'
    uploadedSvg.style.display  = ''
    uploadPanel.classList.add('has-file')
    clearResult()
    setStatus('File ready — press play!', '')
  })

  // ── Output panel — click to re-download ─────────────────────────────────────
  outputPanel.addEventListener('click', () => {
    if (!resultBlob) return
    triggerDownload(resultBlob, MODES[currentMode].download)
  })

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob)
    const a   = document.createElement('a')
    a.href     = url
    a.download = filename
    a.click()
    URL.revokeObjectURL(url)
  }

  // ── Play button — run the pipeline ──────────────────────────────────────────
  playBtn.addEventListener('click', async () => {
    // Always play the sound
    sound.currentTime = 0
    sound.play().catch(() => {})

    if (!selectedFile) {
      setStatus('Upload a .zip first!', 'error')
      return
    }

    if (playBtn.classList.contains('loading')) return

    // Loading state
    playBtn.classList.add('loading')
    clearResult()
    setStatus('Processing\u2026', '')

    try {
      const formData = new FormData()
      formData.append('file', selectedFile)

      const res = await fetch(API_BASE + MODES[currentMode].endpoint, {
        method: 'POST',
        body: formData,
      })

      if (!res.ok) throw new Error('Server error ' + res.status)

      const blob = await res.blob()
      triggerDownload(blob, MODES[currentMode].download)
      setResult(blob)
      setStatus('\u2713 ' + MODES[currentMode].download + ' downloaded!', 'done')
    } catch (err) {
      setStatus('\u2717 ' + err.message, 'error')
      clearResult()
    } finally {
      playBtn.classList.remove('loading')
    }
  })
</script>
</body>
</html>
